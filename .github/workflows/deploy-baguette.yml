name: Deploy BaguetteDesign

on:
  push:
    branches: [master]
    paths:
      - 'src/BaguetteDesign.**/**'
      - 'src/SharedBotKernel/**'
      - 'src/BaguetteDesign.Api/Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build & Test (Baguette scope)
        run: |
          dotnet restore BotPlatform.sln
          dotnet build src/BaguetteDesign.Api/BaguetteDesign.Api.csproj --no-restore --configuration Release
          dotnet test tests/SharedBotKernel.Tests/SharedBotKernel.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/BaguetteDesign.Domain.Tests/BaguetteDesign.Domain.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/BaguetteDesign.Application.Tests/BaguetteDesign.Application.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/BaguetteDesign.IntegrationTests/BaguetteDesign.IntegrationTests.csproj --configuration Release --verbosity normal

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service baguette-design --detach
