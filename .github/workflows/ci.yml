name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore LagerthaAssistant.sln

      - name: Build
        run: dotnet build LagerthaAssistant.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test LagerthaAssistant.sln --no-build --configuration Release --verbosity normal
